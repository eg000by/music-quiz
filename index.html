<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo-mark.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Шрифт грузим из head с preconnect, а не render-blocking @import в CSS -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500;1,600&display=swap" />

    <title>Музыкальная викторина — угадай трек и год</title>
    <meta name="description" content="Угадай песню по 30-секундному отрывку и год её выпуска. Играй с друзьями по коду лобби — кто наберёт больше очков?" />

    <!-- Open Graph (статичные теги для всех ссылок; динамический OG отложен до серверного слоя) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Музыкальная викторина" />
    <meta property="og:title" content="Музыкальная викторина — угадай трек и год" />
    <meta property="og:description" content="Угадай песню по короткому отрывку и год выпуска. Зови друзей по коду лобби и соревнуйтесь!" />
    <meta property="og:image" content="https://egorii.fun/og.png" />
    <meta property="og:image:width" content="3750" />
    <meta property="og:image:height" content="1969" />
    <meta property="og:url" content="https://egorii.fun/" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Музыкальная викторина — угадай трек и год" />
    <meta name="twitter:description" content="Угадай песню по короткому отрывку и год выпуска. Зови друзей и соревнуйтесь!" />
    <meta name="twitter:image" content="https://egorii.fun/og.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
